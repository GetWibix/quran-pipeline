version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10
    reviewers:
      - GetWibix

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 10
    reviewers:
      - GetWibix

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 5
    reviewers:
      - GetWibix

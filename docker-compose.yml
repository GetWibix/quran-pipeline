services:
  app:
    build: .
    command: ["node", "dist/scheduler.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://quran_user:REDACTED_PASSWORD@postgres:5432/quran_pipeline"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - ./assets:/app/assets
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/queue/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://quran_user:REDACTED_PASSWORD@postgres:5432/quran_pipeline"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - ./assets:/app/assets
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quran_pipeline
      POSTGRES_USER: quran_user
      POSTGRES_PASSWORD: REDACTED_PASSWORD
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quran_user -d quran_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
